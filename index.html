<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procesador Geométrico DXF v2</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-100 text-slate-800 min-h-screen flex flex-col">

<header class="bg-slate-800 text-white p-4 text-center font-bold">
    Procesador DXF - Backend Seguro
</header>

<main class="p-4 max-w-5xl mx-auto w-full space-y-6">

<!-- ================= CSV ================= -->
<section class="bg-white p-4 rounded shadow space-y-3">
    <h2 class="font-bold text-lg">Cargar CSV</h2>

    <input type="file" id="csvFile" class="block">

    <label>
        <input type="checkbox" id="csvInvertirSentido">
        Invertir sentido
    </label>

    <select id="csvDecimalesSegundos">
        <option value="0">0 decimales</option>
        <option value="1">1 decimal</option>
        <option value="2">2 decimales</option>
    </select>

    <button onclick="procesarCSV()" class="bg-blue-600 text-white px-4 py-2 rounded">
        Procesar CSV
    </button>

    <button onclick="descargarCSV()" class="bg-green-600 text-white px-4 py-2 rounded" disabled id="csvDownloadBtn">
        Descargar DXF + DOC
    </button>

    <p id="csvInfo" class="text-sm"></p>
    <p id="csvAlerta" class="text-red-600"></p>

    <canvas id="csvCanvas" width="500" height="400" class="border"></canvas>
</section>

<!-- ================= DXF ================= -->
<section class="bg-white p-4 rounded shadow space-y-3">
    <h2 class="font-bold text-lg">Cargar DXF</h2>

    <input type="file" id="dxfFile" class="block">

    <label>
        <input type="checkbox" id="dxfInvertirSentido">
        Invertir sentido
    </label>

    <select id="dxfDecimalesSegundos">
        <option value="0">0 decimales</option>
        <option value="1">1 decimal</option>
        <option value="2">2 decimales</option>
    </select>

    <button onclick="procesarDXF()" class="bg-blue-600 text-white px-4 py-2 rounded">
        Procesar DXF
    </button>

    <button onclick="descargarDXF()" class="bg-green-600 text-white px-4 py-2 rounded" disabled id="dxfDownloadBtn">
        Descargar DXF + DOC
    </button>

    <p id="dxfInfo" class="text-sm"></p>
    <p id="dxfAlerta" class="text-red-600"></p>

    <canvas id="dxfCanvas" width="500" height="400" class="border"></canvas>
</section>

</main>

<script>

const BACKEND_URL = "https://poligono-azimut-backend.onrender.com";

//const BACKEND_URL = "http://localhost:3000";

// ================= VARIABLES =================
let csvVertices = [];
let csvVerticesOriginales = [];

let dxfVertices = [];
let dxfVerticesOriginales = [];

// ================= UTIL =================
function obtenerDistancia(a,b){
    return Math.sqrt((b.x-a.x)**2 + (b.y-a.y)**2);
}

// ================= CSV =================
function procesarCSV(){
    const file = document.getElementById("csvFile").files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = (e)=>{
        const lines = e.target.result.split(/\r?\n/);

        csvVerticesOriginales = [];

        lines.forEach(l=>{
            const p = l.split(/[,;\t]/);
            if(p.length < 3) return;

            const x = parseFloat(p[1]);
            const y = parseFloat(p[2]);

            if(!isNaN(x) && !isNaN(y)){
                csvVerticesOriginales.push({x,y,bulbo:0});
            }
        });

        csvVertices = [...csvVerticesOriginales];

        dibujarCSV();
        document.getElementById("csvDownloadBtn").disabled = false;
    };

    reader.readAsText(file);
}

function dibujarCSV(){
    const canvas = document.getElementById("csvCanvas");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(csvVertices.length < 3) return;

    const xs = csvVertices.map(v=>v.x);
    const ys = csvVertices.map(v=>v.y);

    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);

    const scale = Math.min(canvas.width/(maxX-minX), canvas.height/(maxY-minY))*0.8;

    const tx = x => (x-minX)*scale + 50;
    const ty = y => canvas.height - ((y-minY)*scale + 50);

    ctx.beginPath();
    csvVertices.forEach((v,i)=>{
        const x = tx(v.x);
        const y = ty(v.y);
        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.stroke();
}

async function descargarCSV(){
    const dec = parseInt(document.getElementById("csvDecimalesSegundos").value);

    const res = await fetch(`${BACKEND_URL}/api/generar-dxf`,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            vertices: csvVertices,
            decimalesSegundos: dec,
            radioCustom: 1,
            txtVerticesCustom: 1,
            txtTablaCustom: 1
        })
    });

    const data = await res.json();

    triggerDescarga(data.dxfContenido,"csv.dxf","application/dxf");

    if(data.minutaTextoHtml){
        triggerDescarga("\ufeff"+data.minutaTextoHtml,"csv.doc","application/msword");
    }
}

// ================= DXF =================
function procesarDXF(){
    const file = document.getElementById("dxfFile").files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = (e)=>{
        const lines = e.target.result.split(/\r?\n/);

        dxfVerticesOriginales = [];

        let x=[], y=[], b=[];

        for(let i=0;i<lines.length;i++){
            if(lines[i]==="10") x.push(parseFloat(lines[i+1]));
            if(lines[i]==="20") y.push(parseFloat(lines[i+1]));
            if(lines[i]==="42") b.push(parseFloat(lines[i+1]));
        }

        for(let i=0;i<x.length;i++){
            dxfVerticesOriginales.push({
                x:x[i], y:y[i], bulbo:b[i]||0
            });
        }

        dxfVertices = [...dxfVerticesOriginales];

        dibujarDXF();
        document.getElementById("dxfDownloadBtn").disabled = false;
    };

    reader.readAsText(file);
}

function dibujarDXF(){
    const canvas = document.getElementById("dxfCanvas");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(dxfVertices.length < 3) return;

    const xs = dxfVertices.map(v=>v.x);
    const ys = dxfVertices.map(v=>v.y);

    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);

    const scale = Math.min(canvas.width/(maxX-minX), canvas.height/(maxY-minY))*0.8;

    const tx = x => (x-minX)*scale + 50;
    const ty = y => canvas.height - ((y-minY)*scale + 50);

    ctx.beginPath();
    dxfVertices.forEach((v,i)=>{
        const x=tx(v.x), y=ty(v.y);
        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    });
    ctx.stroke();
}

async function descargarDXF(){
    const dec = parseInt(document.getElementById("dxfDecimalesSegundos").value);

    const res = await fetch(`${BACKEND_URL}/api/generar-dxf`,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            vertices: dxfVertices,
            decimalesSegundos: dec,
            radioCustom: 1,
            txtVerticesCustom: 1,
            txtTablaCustom: 1
        })
    });

    const data = await res.json();

    triggerDescarga(data.dxfContenido,"dxf.dxf","application/dxf");

    if(data.minutaTextoHtml){
        triggerDescarga("\ufeff"+data.minutaTextoHtml,"dxf.doc","application/msword");
    }
}

// ================= DESCARGA =================
function triggerDescarga(content, filename, type){
    const blob = new Blob([content], {type});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
